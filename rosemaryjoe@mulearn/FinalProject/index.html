<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rosemary Joe</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4ff;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 90%;
    }

    .emoji { font-size: 3rem; margin-bottom: 16px; }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 32px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.9rem;
    }

    .row:last-of-type { border-bottom: none; }
    .key { color: #888; }
    .val { color: #1a1a2e; font-weight: 600; }

    .status {
      margin-top: 28px;
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🚀</div>
    <h1>Rosemary Joe</h1>
    <p class="sub">Shipyard Foundations · Batch 26</p>

    <div class="row"><span class="key">Container</span><span class="val">nginx:alpine</span></div>
    <div class="row"><span class="key">Cluster</span><span class="val">KIND</span></div>
    <div class="row"><span class="key">Replicas</span><span class="val">3 Pods</span></div>
    <div class="row"><span class="key">Project</span><span class="val">Final Project</span></div>

    <div class="status">● All systems running</div>
  </div>
</body>
</html>
